name: Kickstarter Slack Report

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run Kickstarter report
        run: npm start
        env:
          KICKSTARTER_STATS_URL: ${{ secrets.KICKSTARTER_STATS_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}