name: Kickstarter Slack Report

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Run Kickstarter report
        run: npm start
        env:
          KICKSTARTER_STATS_URL: ${{ secrets.KICKSTARTER_STATS_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Commit updated state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update Kickstarter state
          file_pattern: state.json